<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="clock"></div>
    <script>
        function display(){
            const now = new Date();
            document.getElementById("clock").innerText = now.toLocaleTimeString();
        }

        setInterval(()=>{
            display();
        }, 1000);
    </script>
    <div>
        counter:
        <div id="display">0</div>
        <button id ="incre" >+</button>
        <button id="decre" >-</button>
    </div>
    <script>
        let val = 0;
        document.getElementById("incre").addEventListener("click",()=>{
            val++;
            document.getElementById("display").innerText = val;
        })
        document.getElementById("decre").addEventListener("click",()=>{
            val--;
            document.getElementById("display").innerText = val;
        })
        
    </script>
</body>
</html>
